<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculator.css">
    <title>Calculadora</title>
</head>
<body>

    <h1>Calculator</h1>

    Number 1: <input type="number" id="num1"><br><br>
    Number 2: <input type="number" id="num2"><br><br>

    Answer: <input type="text" id="resultado" readonly><br><br>

    <div id="display-resultado" style="font-weight: bold; color: rgb(240, 240, 243); margin-bottom: 10px;">
        Resultado: 
    </div>

    <button onclick="sumar()">+</button>
    <button onclick="restar()">-</button>
    <button onclick="multiplicar()">*</button>
    <button onclick="dividir()">/</button>
    <button onclick="modulo()">%</button>

    <script src="calculator.js"></script>

</body>
</html>

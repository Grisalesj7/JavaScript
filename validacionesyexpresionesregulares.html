<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="validacionesyexpresionesregulares.css">
    <title>Taller dom</title>
</head>
<body>
    
    <h2>Registro de Usuario</h2>

    <form id="formulario">

        <div>
            <input type="text" id="nombre" placeholder="Nombre completo">
            <small class="error" id="errorNombre"></small>
        </div>
        <br>

        <div>
            <input type="text" id="correo" placeholder="Correo electronico">
            <small class="error" id="errorCorreo"></small>
        </div>
        <br>

        <div>
            <input type="number" id="telefono" placeholder="Ingrese su numero de telefono">
            <small class="error" id="errorTelefono"></small>
        </div>
        <br>

        <div>
            <input type="password" id="password" placeholder="Ingrese su contraseña">
            <small class="error" id="errorPassword"></small>
        </div>
        <br>

        <button type="submit" id="btnRegistrar" disabled>Registrar</button>
    </form>

    <h3>Usuarios Registrados</h3>
    <ul id="listaUsuarios"></ul>

    <p id="mensajeExito" class="exito"></p>

    <script src="validacionesyexpresionesregulares.js"></script>
</body>
</html>
